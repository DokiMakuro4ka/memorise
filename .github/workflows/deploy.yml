name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Quick SSH check
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo VPS_OK"

      - name: Deploy via rsync (atomic-safe)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/quest-deploy

      - name: Run remote deploy script (IMPORTANT)
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            echo "📦 Deploy start"

            TARGET="/var/www/quest"
            STAGING="/tmp/quest-deploy"

            echo "📁 Checking staging files..."
            test -f "$STAGING/index.html"

            echo "🎬 Checking hero video..."
            test -f "$STAGING/assets/videos/hero-bg.MP4"

            echo "📂 Sync to production..."
            sudo rsync -a --delete "$STAGING/" "$TARGET/"

            echo "🔧 Fix permissions..."
            sudo chown -R www-data:www-data "$TARGET"

            echo "🧪 Nginx test..."
            sudo nginx -t

            echo "🔄 Reload nginx..."
            sudo systemctl reload nginx

            echo "🌐 Check domain resolution..."
            dig quest.barabulka.su +short

            echo "🌍 Check local curl..."
            curl -I https://localhost --resolve quest.barabulka.su:443:127.0.0.1 || true

            echo "✅ Deploy OK"
          EOF
