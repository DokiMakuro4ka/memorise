<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Квест-воспоминания | Наша история в кадрах</title>
    
    <!-- Meta-теги для соцсетей -->
    <meta property="og:title" content="Наши квест-воспоминания | Даша, Алёна, Илья, Артём, Рита">
    <meta property="og:description" content="6 эпичных квестов, смех до утра и незабываемые моменты">
    <meta property="og:image" content="https://quest.barabulka.su/preview.jpg">
    <meta property="og:url" content="https://quest.barabulka.su">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>

<!-- Фоновые эффекты -->
<div class="film-grain"></div>
<div class="vignette"></div>

<!-- Прогресс-бар скролла -->
<div class="progress-bar" id="progressBar"></div>

<!-- Кнопка случайного воспоминания -->
<button class="random-btn" id="randomBtn" aria-label="Случайное воспоминание">🎲</button>

<!-- Переключатель звука -->
<button class="sound-toggle" id="soundToggle" aria-label="Вкл/Выкл звук">🔊</button>

<!-- Модальное окно для фото -->
<div class="modal" id="modal">
    <div class="modal-content">
        <button class="modal-close" id="modalClose">×</button>
        <img id="modalImage" src="" alt="">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
    </div>
</div>

<!-- Основной контент -->
<main>
    <!-- Hero секция -->
    <section class="hero-section">
        <div class="hero-video-bg">
            <video autoplay muted loop playsinline>
                <source src="assets/videos/hero-bg.mp4" type="video/mp4">
            </video>
        </div>
        <div class="hero-content">
            <div class="title-small">ПРЕМЬЕРА</div>
            <h1 class="title-main">НАШИ КВЕСТЫ</h1>
            <div class="title-date">2023 — 2024</div>
        </div>
        <div class="hero-scroll-hint">
            <span>🎬 ПРОКРУТИТЕ ВНИЗ 🎬</span>
        </div>
    </section>

    <!-- Секция с воспоминаниями -->
    <section class="filmography swiper" id="filmography">
        <div class="swiper-wrapper" id="memoriesContainer">
            <!-- Карточки будут добавлены через JavaScript -->
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </section>

    <!-- Футер -->
    <footer class="cinema-footer">
        <div class="footer-content">
            <div class="footer-call">FADE TO BLACK</div>
            <div class="footer-names">
                Создал <strong>Doki</strong> с любовью к настоящим звёздам этого фильма:<br>
                <div class="friends-list">
                    <a class="friend-link" data-friend="dasha">✨ Даша</a>
                    <a class="friend-link" data-friend="alena">🌟 Алёна</a>
                    <a class="friend-link" data-friend="ilya">⭐ Илья</a>
                    <a class="friend-link" data-friend="artem">✨ Артём</a>
                    <a class="friend-link" data-friend="rita">🌟 Рита</a>
                </div>
            </div>
            <div class="footer-quote">
                «Каждый квест — это новая глава нашей истории. И это лучше любого блокбастера.»
            </div>
            <div class="footer-copyright">
                © 2025 — Воспоминания, которые останутся в вечности
            </div>
        </div>
    </footer>
</main>

<!-- Скрипты -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/sound.js"></script>
<script src="js/modal.js"></script>
<script src="js/friends.js"></script>
<script src="js/gallery.js"></script>
<script src="js/scroll.js"></script>
<script src="js/animations.js"></script>
<script src="js/main.js"></script>
</body>
</html>
